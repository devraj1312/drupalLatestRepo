hotel_inventory.manage:
  path: '/manager/inventory'
  defaults:
    _form: '\Drupal\hotel_inventory\Form\InventoryManageForm'
    _title: 'Manage Hotel Inventory'
  requirements:
    _permission: 'access hotel inventory'
  options:
    _admin_route: TRUE

hotel_inventory.manager_bookings_redirect:
  path: '/manager/bookings'
  defaults:
    _controller: '\Drupal\hotel_inventory\Controller\ManagerBookingRedirectController::redirectToHotelBookings'
    _title: 'Manager Bookings'
  requirements:
    _permission: 'access hotel inventory'
  options:
    _admin_route: TRUE